# driftwm TEST config — nested session için
# Canlı config'e dokunmadan özellikleri test etmek için kullan

mod_key = "super"
focus_follows_mouse = true

autostart = []   # nested'da autostart kapalı — elle uygulama açılır

[background]
shader_path = "/home/laa/.config/driftwm/fast_smoke.glsl"

[decorations]
bg_color      = "#1e1e2e"
fg_color      = "#cdd6f4"
corner_radius = 10

[navigation]
friction        = 0.93
animation_speed = 0.3

[keybindings]
"mod+return"       = "exec kitty"
"mod+shift+q"      = "close-window"
"mod+ctrl+shift+q" = "quit"
"mod+f"            = "toggle-fullscreen"

# --- pass_keys testi ---
# [[window_rules]]
# app_id    = "kitty"
# pass_keys = true

# --- opacity testi (transparent glitch fix) ---
[[window_rules]]
app_id  = "kitty"
opacity = 0.85
